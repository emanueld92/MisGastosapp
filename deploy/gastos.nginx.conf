# MisGastos detras del nginx existente del VPS.
# certbot --nginx anade el bloque 443 + redireccion automaticamente.
server {
    listen 80;
    server_name gastos.5.161.239.156.sslip.io;

    root /opt/gastos/web;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}
